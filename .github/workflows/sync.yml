name: IDX Data Sync
run-name: ${{ github.actor }} syncing IDX data...
on:
  schedule:
    - cron: '30 9 * * 1-5'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Sync tier'
        required: true
        type: choice
        default: 'daily'
        options:
          - daily
          - weekly
          - monthly
          - full

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup SSH
        run: |
          mkdir -p -m 700 $HOME/.ssh
          ssh-keyscan -H $HOST >> $HOME/.ssh/known_hosts
          echo "$KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa
          cat >> $HOME/.ssh/config <<EOF
          Host vps
            HostName $HOST
            User $USERNAME
            IdentityFile $HOME/.ssh/id_rsa
            StrictHostKeyChecking yes
          EOF
          chmod 600 $HOME/.ssh/config
        env:
          KEY: ${{ secrets.KEY }}
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}

      - name: Check SSH
        run: ssh -o ConnectTimeout=5 vps "echo SSH OK" || exit 1

      - name: Clone or update IDX-API on VPS
        run: |
          ssh vps "
            if [ -d /root/IDX-API ]; then
              cd /root/IDX-API && git pull origin main
            else
              git clone https://github.com/andrasat/IDX-API.git /root/IDX-API
            fi
          "

      - name: Determine sync tier
        id: tier
        run: |
          if [ "${{ github.event.inputs.tier }}" != "" ]; then
            echo "tier=${{ github.event.inputs.tier }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "0" ]; then
            echo "tier=weekly" >> $GITHUB_OUTPUT
          elif [ "$(date +%-d)" = "2" ]; then
            echo "tier=monthly" >> $GITHUB_OUTPUT
          else
            echo "tier=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run daily sync
        if: steps.tier.outputs.tier == 'daily' || steps.tier.outputs.tier == 'weekly' || steps.tier.outputs.tier == 'monthly' || steps.tier.outputs.tier == 'full'
        run: |
          ssh vps "cd /root/IDX-API && deno run -A src/Backend/Sync/scheduled_daily.ts \$(date +%Y%m%d -d '1 day ago')"

      - name: Run weekly sync
        if: steps.tier.outputs.tier == 'weekly' || steps.tier.outputs.tier == 'full'
        run: |
          ssh vps "cd /root/IDX-API && deno run -A src/Backend/Sync/scheduled_weekly.ts"

      - name: Run monthly sync
        if: steps.tier.outputs.tier == 'monthly' || steps.tier.outputs.tier == 'full'
        run: |
          ssh vps "cd /root/IDX-API && deno run -A src/Backend/Sync/scheduled_monthly.ts \$(date +%Y -d 'last month') \$(date +%-m -d 'last month')"
